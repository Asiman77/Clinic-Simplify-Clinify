services:

  mysql:
    image: mysql:8.0
    container_name: demo-mysql

    environment:
      MYSQL_DATABASE: demo
      MYSQL_ROOT_PASSWORD: root

    ports:
      - "3307:3306"

    volumes:
      - mysql-data:/var/lib/mysql


  app:
    build: .

    container_name: demo-app

    ports:
      - "8080:8080"

    depends_on:
      - mysql

    env_file:
      - .env


volumes:
  mysql-data: